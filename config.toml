# Site-wide configuration for Suomen Palikkaharrastajat ry
# Edit this file to update branding, navigation, and footer content.

[site]
title       = "Suomen Palikkaharrastajat ry"
description = "LEGO-harrastajien rekisteröity yhdistys Suomessa"
url         = "https://palikkaharrastajat.fi"

[metadata]
author = "Suomen Palikkaharrastajat ry"
locale = "fi_FI"
robots = "index, follow"
theme_color = "#05131D"
color_scheme = "light dark"
format_detection = "telephone=no"
default_social_image = "/og-image.png"
default_social_image_alt = "Suomen Palikkaharrastajat ry"
twitter_card = "summary_large_image"
# twitter_site = "@yourhandle"

[icons]
favicon_ico = "/favicon.ico"
favicon_svg = "/favicon.svg"
favicon_16 = "/favicon-16x16.png"
favicon_32 = "/favicon-32x32.png"
favicon_48 = "/favicon-48x48.png"
favicon_64 = "/favicon-64x64.png"
apple_touch_icon_120 = "/apple-touch-icon-120.png"
apple_touch_icon_152 = "/apple-touch-icon-152.png"
apple_touch_icon_167 = "/apple-touch-icon-167.png"
apple_touch_icon = "/apple-touch-icon.png"
apple_touch_icon_size = 180
apple_touch_icon_192 = "/apple-touch-icon-192.png"
apple_touch_icon_512 = "/apple-touch-icon-512.png"
android_chrome_192 = "/icon-192.png"
android_chrome_512 = "/icon-512.png"

[pwa]
manifest_path = "/site.webmanifest"
application_name = "Palikkaharrastajat"
short_name = "Palikkaharrastajat"
description = "Suomen Palikkaharrastajat ry"
start_url = "/"
display = "standalone"
background_color = "#ffffff"
theme_color = "#05131D"
mobile_web_app_capable = true
apple_mobile_web_app_capable = true
apple_mobile_web_app_status_bar_style = "default"
apple_mobile_web_app_title = "Palikkaharrastajat"

[pwa.icons]
icon_192 = "/icon-192.png"
icon_512 = "/icon-512.png"
maskable_icon = "/icon-maskable.png"

[branding]
# Horizontal logo paths — light variant for dark surfaces, dark variant for light surfaces.
logo_light = "/logo/horizontal/svg/horizontal-full.svg"
logo_light_mobile = "/logo/horizontal/svg/horizontal.svg"
logo_dark  = "/logo/horizontal/svg/horizontal-full-dark-bold.svg"
logo_dark_mobile  = "/logo/horizontal/svg/horizontal.svg"
logo_alt   = "Suomen Palikkaharrastajat ry"

[navbar]
# Set to true to make the navbar sticky (fixed at top of viewport on mobile).
sticky = true

[footer]
# Square logo shown in the footer.
logo        = "/logo/square/svg/square-smile-full-dark-bold.svg"
# Label rendered above the footer link list (typically the organisation name).
site_label  = "Palikkaharrastajat"
copyright   = "© 2026 Suomen Palikkaharrastajat ry"
disclaimer  = "LEGO® on LEGO Groupin rekisteröity tavaramerkki"
links = [
    { label = "Jäsenfoorumi", href = "https://forum.palikkaharrastajat.fi" },
    { label = "Palikkakalenteri", href = "https://kalenteri.palikkaharrastajat.fi" },
    { label = "Jäsenkortti", href = "https://kortti.palikkaharrastajat.fi" },
    { label = "Palikkalinkit", href = "https://linkit.palikkaharrastajat.fi" },
    { label = "Jäsenmaksu", href = "https://maksut.palikkaharrastajat.fi" },
]
