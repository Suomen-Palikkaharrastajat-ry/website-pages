name: Build and Deploy

# Checks out the site engine (website-build), feeds this repo's content
# into it, and deploys the result to this repo's GitHub Pages.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  ENGINE_REPO: Suomen-Palikkaharrastajat-ry/website-build

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Check out this (content) repo
      - name: Checkout content
        uses: actions/checkout@v4
        with:
          path: content

      # Check out the engine repo alongside it
      - name: Checkout engine
        uses: actions/checkout@v4
        with:
          repository: ${{ env.ENGINE_REPO }}
          path: engine
          # Add 'token: ${{ secrets.ENGINE_PAT }}' here for a private engine repo

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: engine/node_modules
          key: npm-${{ hashFiles('engine/package-lock.json') }}
          restore-keys: npm-

      - name: Cache Elm packages
        uses: actions/cache@v4
        with:
          path: ~/.elm
          key: elm-${{ hashFiles('engine/elm.json') }}
          restore-keys: elm-

      - name: Cache elm-pages codegen
        uses: actions/cache@v4
        with:
          path: engine/.elm-pages
          key: elm-pages-${{ hashFiles('engine/elm.json', 'engine/package.json') }}
          restore-keys: elm-pages-

      - name: Install npm dependencies
        working-directory: engine
        run: npm ci

      - name: Inject build metadata
        working-directory: engine
        run: bash scripts/inject-build-meta.sh
        env:
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          # Pass this (content) repo so site-config.json points at the right place
          GITHUB_REPOSITORY: ${{ github.repository }}
          OAUTH_CLIENT_ID: ${{ vars.OAUTH_CLIENT_ID }}

      - name: Build elm-pages site
        working-directory: engine
        run: npx elm-pages build
        env:
          # ../content is relative to the engine working directory
          CONTENT_DIR: ../content

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: engine/dist/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  verify:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout engine (for smoke-test script)
        uses: actions/checkout@v4
        with:
          repository: ${{ env.ENGINE_REPO }}
      - name: Smoke test
        run: bash scripts/smoke-test.sh
        env:
          SITE_URL: ${{ needs.deploy.outputs.page_url }}
